name: Instagram scheduled sync

on:
  schedule:
    # 1日4回（UTC）= 日本時間 05:17 / 11:17 / 17:17 / 23:17
    - cron: '17 20,2,8,14 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Call full-sync API
        run: |
          RESPONSE=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            -X GET "${{ secrets.VERCEL_URL }}/api/instagram/full-sync" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}")
          echo "HTTP Status: $RESPONSE"
          cat /tmp/response.json
          if [ "$RESPONSE" -eq 401 ]; then
            echo "::error::Instagramトークンが期限切れです。再連携してください。"
            exit 1
          fi
          if [ "$RESPONSE" -eq 403 ]; then
            echo "::error::API権限が不足しています。"
            exit 1
          fi
          if [ "$RESPONSE" -ne 200 ]; then
            echo "::error::同期APIエラー: HTTP $RESPONSE"
            exit 1
          fi
          echo "同期完了"
      - name: Call snapshot sync API
        run: |
          RESPONSE=$(curl -s -o /tmp/snapshot-response.json -w "%{http_code}" \
            -X GET "${{ secrets.VERCEL_URL }}/api/instagram/sync" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}")
          echo "HTTP Status: $RESPONSE"
          cat /tmp/snapshot-response.json
          if [ "$RESPONSE" -ne 200 ] && [ "$RESPONSE" -ne 207 ]; then
            echo "::error::履歴同期APIエラー: HTTP $RESPONSE"
            exit 1
          fi
          echo "履歴同期完了"
