name: Instagram full sync (hourly)

on:
  schedule:
    # 毎時5分に実行（UTC）= 日本時間 毎時14分
    - cron: '5 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Call full-sync API
        run: |
          RESPONSE=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            -X POST "${{ secrets.VERCEL_URL }}/api/instagram/full-sync" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}")
          echo "HTTP Status: $RESPONSE"
          cat /tmp/response.json
          if [ "$RESPONSE" -eq 401 ]; then
            echo "::error::Instagramトークンが期限切れです。再連携してください。"
            exit 1
          fi
          if [ "$RESPONSE" -eq 403 ]; then
            echo "::error::API権限が不足しています。"
            exit 1
          fi
          if [ "$RESPONSE" -ne 200 ]; then
            echo "::error::同期APIエラー: HTTP $RESPONSE"
            exit 1
          fi
          echo "同期完了"
