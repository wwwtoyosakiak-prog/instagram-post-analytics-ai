name: Instagram Scheduled Sync

on:
  schedule:
    # JST 0時/6時/12時/18時 = UTC 15時/21時/3時/9時
    - cron: '0 15 * * *'
    - cron: '0 21 * * *'
    - cron: '0 3 * * *'
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Call Instagram sync endpoint
        run: |
          response=$(curl -s -o /tmp/body.txt -w "%{http_code}" \
            -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://instagram-post-analytics-ai.vercel.app/api/cron/instagram-scheduled-sync")
          echo "HTTP status: $response"
          echo "Response body:"
          cat /tmp/body.txt
          if [ "$response" -ne 200 ]; then
            echo "Sync failed with status $response"
            exit 1
          fi
